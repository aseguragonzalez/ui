name: Bug report
description: Something is not working as expected
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please check that the issue has not already been reported and that you are using the latest version of the package.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Render `<TextField label="Name" errorMessage="Required" />`
        2. Focus the input with Tab
        3. The error message is not announced by the screen reader
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproduction
      description: A code snippet or a link to a CodeSandbox / StackBlitz that reproduces the issue.
      render: tsx

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: react-version
    attributes:
      label: React version
      placeholder: "19.0.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser / environment
      multiple: true
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Node.js (SSR)
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, screen reader output, axe report, or anything else relevant.
