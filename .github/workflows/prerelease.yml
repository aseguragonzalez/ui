name: Pre-release

on:
  workflow_dispatch:
    inputs:
      preid:
        description: 'Pre-release identifier used as dist-tag (e.g. pr-42). Leave empty to auto-detect from the PR open for this branch, falling back to the branch name.'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read

  publish:
    name: Publish pre-release
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Resolve dist-tag
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INPUT_PREID="${{ inputs.preid }}"
          if [ -n "$INPUT_PREID" ]; then
            TAG=$(echo "$INPUT_PREID" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g;s/^-//;s/-$//')
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "number=" >> $GITHUB_OUTPUT
          else
            PR_NUMBER=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$PR_NUMBER" ]; then
              echo "tag=pr-${PR_NUMBER}" >> $GITHUB_OUTPUT
              echo "number=${PR_NUMBER}" >> $GITHUB_OUTPUT
            else
              BRANCH_TAG=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g;s/^-//;s/-$//')
              echo "tag=${BRANCH_TAG:-next}" >> $GITHUB_OUTPUT
              echo "number=" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Compute pre-release version
        id: version
        run: |
          BASE=$(node -p "require('./package.json').version" | sed 's/-.*//')
          VERSION="${BASE}-${{ steps.pr.outputs.tag }}.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          npm version "${VERSION}" --no-git-tag-version
          echo "value=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: |
          npm config delete //registry.npmjs.org/:_authToken
          if npm view "@aseguragonzalez/ui@${{ steps.version.outputs.value }}" > /dev/null 2>&1; then
            echo "Version already published to npm, skipping."
          else
            npm publish --provenance --tag ${{ steps.pr.outputs.tag }} --access public
          fi

      - name: Set up Node.js for GitHub Packages
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@aseguragonzalez'

      - name: Publish to GitHub Packages
        run: |
          if npm view "@aseguragonzalez/ui@${{ steps.version.outputs.value }}" --registry=https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "Version already published to GitHub Packages, skipping."
          else
            npm publish --tag ${{ steps.pr.outputs.tag }}
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > comment.md << 'EOF'
          ### Pre-release published :package:

          Install this PR's build:

          ```sh
          npm install @aseguragonzalez/ui@${{ steps.pr.outputs.tag }}
          ```

          **Version:** `${{ steps.version.outputs.value }}`
          EOF
          gh pr comment ${{ steps.pr.outputs.number }} --body-file comment.md --edit-last 2>/dev/null \
            || gh pr comment ${{ steps.pr.outputs.number }} --body-file comment.md

      - name: Summary
        run: |
          echo "## Pre-release \`${{ steps.version.outputs.value }}\` published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install by version:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "npm install @aseguragonzalez/ui@${{ steps.version.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "Install by tag (always points to the latest publish for this identifier):" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "npm install @aseguragonzalez/ui@${{ steps.pr.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
