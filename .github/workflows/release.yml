name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  quality:
    uses: ./.github/workflows/quality.yml
    permissions:
      contents: read

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Release
        id: release
        run: |
          set -o pipefail
          npx semantic-release 2>&1 | tee /tmp/sr-output.txt
          VERSION=$(grep -oP 'Published release \K\S+' /tmp/sr-output.txt | head -1 || true)
          if [ -n "$VERSION" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Set up Node.js for GitHub Packages
        if: steps.release.outputs.new_release_published == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@aseguragonzalez'

      - name: Publish to GitHub Packages
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          VERSION="${{ steps.release.outputs.new_release_version }}"
          if npm view "@aseguragonzalez/ui@${VERSION}" --registry=https://npm.pkg.github.com > /dev/null 2>&1; then
            echo "Version ${VERSION} already published to GitHub Packages, skipping."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
